name: Build Android APK (debug) + upload to S3

# Builds the customer app into an installable **debug** APK and uploads it to S3
# at s3://abs-ppw-media/app/PurbanchalPapers.apk — the exact object the login
# page's "Install App" button downloads (see customer/src/config.ts APK_URL).
#
# The app loads https://onlineppw.com live, so the web deploy already refreshes
# content; the APK only needs rebuilding when a *native* change lands (a new
# Capacitor plugin, back-button handling, permissions, etc.). Debug builds are
# self-signed with the Android debug key, so no keystore secrets are required.
#
# Required repo secrets (Settings -> Secrets and variables -> Actions):
#   AWS_ACCESS_KEY_ID       IAM key with s3:PutObject on abs-ppw-media
#   AWS_SECRET_ACCESS_KEY   its secret
# The built APK is also attached to each run as a workflow artifact, so it is
# downloadable even before the S3 secrets are configured.

on:
  push:
    branches: [ main ]
    paths:
      - 'customer/**'
      - '.github/workflows/android.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: customer
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: customer/package-lock.json

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21   # Capacitor 8 compiles Android against Java 21

      - uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Compute version
        id: ver
        run: |
          echo "code=${{ github.run_number }}" >> "$GITHUB_OUTPUT"
          echo "name=1.0.${{ github.run_number }}" >> "$GITHUB_OUTPUT"

      - name: Build web bundle
        run: npm run build

      - name: Stamp Android version (versionCode must increase for in-place upgrades)
        run: |
          sed -i "s/versionCode .*/versionCode ${{ steps.ver.outputs.code }}/" android/app/build.gradle
          sed -i "s/versionName .*/versionName \"${{ steps.ver.outputs.name }}\"/" android/app/build.gradle

      - name: Sync Capacitor (copies web bundle + registers native plugins)
        run: npx cap sync android

      - name: Build debug APK
        working-directory: customer/android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug

      - name: Rename APK
        run: cp android/app/build/outputs/apk/debug/app-debug.apk PurbanchalPapers.apk

      - name: Upload APK as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: PurbanchalPapers-apk
          path: customer/PurbanchalPapers.apk

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Upload APK to S3
        run: |
          aws s3 cp PurbanchalPapers.apk s3://abs-ppw-media/app/PurbanchalPapers.apk \
            --content-type application/vnd.android.package-archive \
            --cache-control no-cache
