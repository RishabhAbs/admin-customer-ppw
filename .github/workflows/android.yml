name: Build Android APK + Capgo OTA

# Builds the customer app into a signed APK, publishes it as a GitHub Release
# (the "Install App" button on the login page points at releases/latest), and
# pushes a Capgo live-update bundle so already-installed apps auto-update.
#
# Required repo secrets (Settings -> Secrets and variables -> Actions) — see
# SETUP-MOBILE.md for how to generate each:
#   ANDROID_KEYSTORE_BASE64     base64 of your release keystore (.jks)
#   ANDROID_KEYSTORE_PASSWORD   keystore password
#   ANDROID_KEY_ALIAS           key alias
#   ANDROID_KEY_PASSWORD        key password
#   CAPGO_TOKEN                 Capgo API token (optional; OTA step is skipped if unset)

on:
  push:
    branches: [ main ]
    paths:
      - 'customer/**'
      - '.github/workflows/android.yml'
  workflow_dispatch:

permissions:
  contents: write   # needed to create the GitHub Release

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      CAPGO_TOKEN: ${{ secrets.CAPGO_TOKEN }}
    defaults:
      run:
        working-directory: customer
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: customer/package-lock.json

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21   # Capacitor 8 compiles Android against Java 21

      - uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Compute version
        id: ver
        run: |
          echo "code=${{ github.run_number }}" >> "$GITHUB_OUTPUT"
          echo "name=1.0.${{ github.run_number }}" >> "$GITHUB_OUTPUT"

      - name: Build web bundle
        run: npm run build

      - name: Stamp Android version (versionCode must increase for in-place upgrades)
        run: |
          sed -i "s/versionCode .*/versionCode ${{ steps.ver.outputs.code }}/" android/app/build.gradle
          sed -i "s/versionName .*/versionName \"${{ steps.ver.outputs.name }}\"/" android/app/build.gradle

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Build release APK (unsigned)
        working-directory: customer/android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleRelease

      - name: Sign APK
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "::error::ANDROID_KEYSTORE_* secrets are not set. See SETUP-MOBILE.md."
            exit 1
          fi
          echo "$KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/release.jks"
          BUILD_TOOLS=$(ls -d "$ANDROID_SDK_ROOT"/build-tools/* | sort -V | tail -1)
          UNSIGNED=android/app/build/outputs/apk/release/app-release-unsigned.apk
          "$BUILD_TOOLS/zipalign" -f 4 "$UNSIGNED" "$RUNNER_TEMP/aligned.apk"
          "$BUILD_TOOLS/apksigner" sign \
            --ks "$RUNNER_TEMP/release.jks" \
            --ks-pass "pass:$KEYSTORE_PASSWORD" \
            --ks-key-alias "$KEY_ALIAS" \
            --key-pass "pass:$KEY_PASSWORD" \
            --out PurbanchalPapers.apk \
            "$RUNNER_TEMP/aligned.apk"
          "$BUILD_TOOLS/apksigner" verify --print-certs PurbanchalPapers.apk

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.ver.outputs.name }}
          name: PurbanchalPapers v${{ steps.ver.outputs.name }}
          files: customer/PurbanchalPapers.apk
          make_latest: true

      - name: Push Capgo OTA bundle
        if: ${{ env.CAPGO_TOKEN != '' }}
        run: npx --yes @capgo/cli bundle upload -a com.purbanchal.papers -c production -b ${{ steps.ver.outputs.name }} --apikey "$CAPGO_TOKEN"
